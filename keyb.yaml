# tmux cheat sheet

- name: tmux (sessions)
  keybinds:
    - name: "New session"
      key: "tmux new -s <name>"
    - name: "List sessions"
      key: "tmux ls"
    - name: "Attach to session"
      key: "tmux attach -t <name>"
    - name: "Attach (detach others)"
      key: "tmux attach -d -t <name>"
    - name: "Kill session"
      key: "tmux kill-session -t <name>"
    - name: "Kill all sessions"
      key: "tmux kill-server"
    - name: "Rename session"
      key: "tmux rename-session -t <old> <new>"

- name: tmux (session keys)
  prefix: "Ctrl+b"
  keybinds:
    - name: "Detach from session"
      key: "d"
    - name: "Rename current session"
      key: "$"
    - name: "List sessions"
      key: "s"
    - name: "Next session"
      key: ")"
    - name: "Previous session"
      key: "("

- name: tmux (windows)
  prefix: "Ctrl+b"
  keybinds:
    - name: "Create new window"
      key: "c"
    - name: "Rename current window"
      key: ","
    - name: "Close current window"
      key: "&"
    - name: "List windows"
      key: "w"
    - name: "Next window"
      key: "n"
    - name: "Previous window"
      key: "p"
    - name: "Go to window number"
      key: "0-9"
    - name: "Find window"
      key: "f"
    - name: "Last active window"
      key: "l"

- name: tmux (panes)
  prefix: "Ctrl+b"
  keybinds:
    - name: "Split horizontally"
      key: "\""
    - name: "Split vertically"
      key: "%"
    - name: "Next pane"
      key: "o"
    - name: "Previous pane"
      key: ";"
    - name: "Show pane numbers"
      key: "q"
    - name: "Go to pane number"
      key: "q + 0-9"
    - name: "Toggle pane zoom"
      key: "z"
    - name: "Break pane to window"
      key: "!"
    - name: "Kill current pane"
      key: "x"
    - name: "Swap with next pane"
      key: "}"
    - name: "Swap with previous pane"
      key: "{"
    - name: "Toggle layouts"
      key: "Space"
    - name: "Resize pane"
      key: "Arrow keys"
    - name: "Move pane left"
      key: "Ctrl+o"

- name: tmux (copy mode)
  prefix: "Ctrl+b"
  keybinds:
    - name: "Enter copy mode"
      key: "["
    - name: "Paste buffer"
      key: "]"
    - name: "Start selection (vi)"
      key: "Space"
    - name: "Copy selection (vi)"
      key: "Enter"
    - name: "Cancel"
      key: "q"
    - name: "Search forward"
      key: "/"
    - name: "Search backward"
      key: "?"
    - name: "Go to top"
      key: "g"
    - name: "Go to bottom"
      key: "G"

- name: tmux (useful commands)
  keybinds:
    - name: "Reload config"
      key: "tmux source-file ~/.tmux.conf"
    - name: "Show all keybindings"
      key: "tmux list-keys"
    - name: "Show options"
      key: "tmux show-options -g"
    - name: "Capture pane to file"
      key: "tmux capture-pane -pS - > file.txt"
    - name: "Send keys to pane"
      key: "tmux send-keys -t <pane> '<cmd>' Enter"
    - name: "Resize pane by 5"
      key: "tmux resize-pane -D 5"
    - name: "Swap windows"
      key: "tmux swap-window -s <src> -t <dst>"
    - name: "Move window"
      key: "tmux move-window -t <num>"
    - name: "Synchronize panes (toggle)"
      key: "tmux setw synchronize-panes"
    - name: "Pipe pane output to log"
      key: "tmux pipe-pane -o 'cat >> ~/tmux.log'"

- name: tmux (misc keys)
  prefix: "Ctrl+b"
  keybinds:
    - name: "Enter command mode"
      key: ":"
    - name: "Show clock"
      key: "t"
    - name: "Show info"
      key: "i"
    - name: "Display message"
      key: "~"

# cp cheat sheet

- name: cp (basic usage)
  keybinds:
    - name: "Copy file"
      key: "cp <src> <dst>"
    - name: "Copy multiple files to dir"
      key: "cp <file1> <file2> <dir>"
    - name: "Copy recursively (directory)"
      key: "cp -r <src_dir> <dst_dir>"
    - name: "Copy with verbose output"
      key: "cp -v <src> <dst>"
    - name: "Interactive (prompt before overwrite)"
      key: "cp -i <src> <dst>"
    - name: "Force overwrite"
      key: "cp -f <src> <dst>"
    - name: "No clobber (don't overwrite)"
      key: "cp -n <src> <dst>"
    - name: "Update (copy only if newer)"
      key: "cp -u <src> <dst>"

- name: cp (preserving attributes)
  keybinds:
    - name: "Preserve mode, ownership, timestamps"
      key: "cp -p <src> <dst>"
    - name: "Archive (preserve all, recursive)"
      key: "cp -a <src> <dst>"
    - name: "Preserve specific attributes"
      key: "cp --preserve=mode,timestamps <src> <dst>"
    - name: "Dereference symlinks"
      key: "cp -L <src> <dst>"
    - name: "Copy symlinks as symlinks"
      key: "cp -d <src> <dst>"

- name: cp (advanced)
  keybinds:
    - name: "Create hard links instead of copies"
      key: "cp -l <src> <dst>"
    - name: "Create symlinks instead of copies"
      key: "cp -s <src> <dst>"
    - name: "Copy with backup of destination"
      key: "cp -b <src> <dst>"
    - name: "Numbered backups"
      key: "cp --backup=numbered <src> <dst>"
    - name: "Set backup suffix"
      key: "cp -S .bak <src> <dst>"
    - name: "Sparse file handling"
      key: "cp --sparse=always <src> <dst>"
    - name: "Copy to target directory"
      key: "cp -t <dir> <file1> <file2>"

# mv cheat sheet

- name: mv (basic usage)
  keybinds:
    - name: "Move/rename file"
      key: "mv <src> <dst>"
    - name: "Move multiple files to dir"
      key: "mv <file1> <file2> <dir>"
    - name: "Move with verbose output"
      key: "mv -v <src> <dst>"
    - name: "Interactive (prompt before overwrite)"
      key: "mv -i <src> <dst>"
    - name: "Force overwrite"
      key: "mv -f <src> <dst>"
    - name: "No clobber (don't overwrite)"
      key: "mv -n <src> <dst>"
    - name: "Update (move only if newer)"
      key: "mv -u <src> <dst>"

- name: mv (advanced)
  keybinds:
    - name: "Create backup of destination"
      key: "mv -b <src> <dst>"
    - name: "Numbered backups"
      key: "mv --backup=numbered <src> <dst>"
    - name: "Set backup suffix"
      key: "mv -S .bak <src> <dst>"
    - name: "Move to target directory"
      key: "mv -t <dir> <file1> <file2>"
    - name: "Rename file (same dir)"
      key: "mv <old_name> <new_name>"
    - name: "Move directory"
      key: "mv <src_dir> <dst_dir>"

- name: mv (common patterns)
  keybinds:
    - name: "Rename with glob (needs loop)"
      key: "for f in *.txt; do mv \"$f\" \"${f%.txt}.md\"; done"
    - name: "Move all files of type to dir"
      key: "mv *.jpg <dir>"
    - name: "Move hidden files"
      key: "mv .* <dir>"
    - name: "Swap two filenames"
      key: "mv a tmp && mv b a && mv tmp b"
